name: Publish PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      git_ref:
        description: Git ref to build and publish, such as a release tag.
        required: true
        default: main

permissions:
  contents: read

jobs:
  build:
    name: build-distributions
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.release.draft == false) }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.git_ref || github.event.release.tag_name }}
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@94527f2e458b27549849d47d273a16bec83a01e9 # v7
      - name: Build distributions
        run: uv build --sdist --wheel
      - name: Upload built distributions
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: python-package-distributions
          path: dist/
          if-no-files-found: error
          compression-level: 0

  publish:
    name: publish-to-pypi
    if: ${{ github.event_name == 'workflow_dispatch' || (github.event_name == 'release' && github.event.release.draft == false) }}
    needs:
      - build
    runs-on: ubuntu-24.04
    environment:
      name: pypi
      url: https://pypi.org/p/openai-tests
    permissions:
      id-token: write
    steps:
      - name: Download built distributions
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: python-package-distributions
          path: dist/
      - name: Publish distributions to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b # v1.14.0
        with:
          packages-dir: dist/
          print-hash: true
